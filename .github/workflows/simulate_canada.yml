name: Run simulations

on:
  workflow_dispatch:
    inputs:
      country:
        description: 'Country / region'
        required: true
        default: 'FRA'
        type: choice
        options:
          - 'FRA'
          - 'CAN'
          - 'CAN_BC'
      custom-country:
        description: 'Override (free-text country code; leave blank to use the dropdown above)'
        required: false
        default: ''
        type: string
      scale:
        description: 'Scale factor (lower = more agents, higher aggregation)'
        required: false
        default: '10000'
        type: string
      t-max:
        description: 'Number of timesteps'
        required: false
        default: '20'
        type: string
      compare-bc:
        description: 'Run CAN vs CAN_BC comparison (overrides country selection)'
        required: false
        default: false
        type: boolean

jobs:
  simulate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
        country: ${{ fromJSON(format('["{0}"]', inputs.custom-country != '' && inputs.custom-country || inputs.country)) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install h5py dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev

      - name: Install project dependencies
        run: uv sync --python ${{ matrix.python-version }} --extra dev

      - name: Run CAN vs CAN_BC comparison
        if: inputs.compare-bc
        run: uv run python test_run/compare_can_bc.py --scale ${{ inputs.scale }} --t-max ${{ inputs.t-max }}

      - name: Run ${{ matrix.country }} simulation
        if: ${{ ! inputs.compare-bc }}
        run: uv run python test_run/run_simulation.py ${{ matrix.country }} --scale ${{ inputs.scale }} --t-max ${{ inputs.t-max }}

      - name: Inspect income for ${{ matrix.country }}
        if: ${{ ! inputs.compare-bc }}
        run: uv run python test_run/inspect_income.py ${{ matrix.country }}

      - name: Generate summary and visualizations for ${{ matrix.country }}
        if: ${{ ! inputs.compare-bc }}
        run: uv run python test_run/summary_and_viz.py ${{ matrix.country }}

      - name: List output
        if: always()
        run: ls -lah output/

      - name: Upload simulation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.country }}-simulation-output
          path: output/
          retention-days: 7
