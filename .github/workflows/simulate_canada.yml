name: Run simulation

on:
  workflow_dispatch:
    inputs:
      country:
        description: "Country to simulate"
        required: true
        type: choice
        default: "FRA"
        options:
          - FRA
          - CAN
          - CAN_BC
      t_max:
        description: "Number of timesteps"
        required: false
        type: number
        default: 20
      scale:
        description: "Scale factor"
        required: false
        type: number
        default: 10000
  push:
    branches:
      - main
      - pit_func
    paths:
      - "macromodel/**"
      - "macro_data/**"
      - "macrocalib/**"
      - "test_run/**"
  pull_request:
    paths:
      - "macromodel/**"
      - "macro_data/**"
      - "macrocalib/**"
      - "test_run/**"

jobs:
  simulate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
        country: ${{ github.event_name == 'workflow_dispatch' && fromJSON('["__manual__"]') || fromJSON('["CAN","FRA"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install h5py dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev

      - name: Install project dependencies
        run: uv sync --python ${{ matrix.python-version }} --extra dev

      # ── Determine target ──────────────────────────────────────────
      - name: Set simulation target
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "country=${{ github.event.inputs.country }}" >> $GITHUB_OUTPUT
            echo "t_max=${{ github.event.inputs.t_max }}" >> $GITHUB_OUTPUT
            echo "scale=${{ github.event.inputs.scale }}" >> $GITHUB_OUTPUT
          else
            echo "country=${{ matrix.country }}" >> $GITHUB_OUTPUT
            echo "t_max=20" >> $GITHUB_OUTPUT
            echo "scale=10000" >> $GITHUB_OUTPUT
          fi

      # ── CAN_BC: run CAN baseline first ───────────────────────────
      - name: [CAN_BC] Run CAN baseline simulation
        if: steps.target.outputs.country == 'CAN_BC'
        run: uv run python test_run/run_simulation.py CAN --t-max ${{ steps.target.outputs.t_max }} --scale ${{ steps.target.outputs.scale }}

      - name: [CAN_BC] Inspect CAN income
        if: steps.target.outputs.country == 'CAN_BC'
        run: uv run python test_run/inspect_income.py CAN

      - name: [CAN_BC] Summarize CAN
        if: steps.target.outputs.country == 'CAN_BC'
        run: uv run python test_run/summary_and_viz.py CAN

      # ── Run requested simulation ──────────────────────────────────
      - name: Run ${{ steps.target.outputs.country }} simulation
        run: uv run python test_run/run_simulation.py ${{ steps.target.outputs.country }} --t-max ${{ steps.target.outputs.t_max }} --scale ${{ steps.target.outputs.scale }}

      - name: Inspect income for ${{ steps.target.outputs.country }}
        run: uv run python test_run/inspect_income.py ${{ steps.target.outputs.country }}

      - name: Summarize ${{ steps.target.outputs.country }}
        run: uv run python test_run/summary_and_viz.py ${{ steps.target.outputs.country }}

      # ── CAN_BC: compare ───────────────────────────────────────────
      - name: [CAN_BC] Compare progressive vs flat tax
        if: steps.target.outputs.country == 'CAN_BC'
        run: uv run python test_run/compare_can_bc.py --no-run --t-max ${{ steps.target.outputs.t_max }}

      # ── Upload ────────────────────────────────────────────────────
      - name: List output
        if: always()
        run: ls -lah output/

      - name: Upload simulation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.target.outputs.country }}-simulation-output
          path: output/
          retention-days: 7
