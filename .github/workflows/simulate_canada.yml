name: Run simulations

on:
  workflow_dispatch:
    inputs:
      country:
        description: 'Country/region code'
        required: true
        default: 'FRA'
        type: string
      scale:
        description: 'Scale factor (lower = more agents, higher aggregation)'
        required: false
        default: '10000'
        type: string
      t-max:
        description: 'Number of timesteps'
        required: false
        default: '20'
        type: string
  push:
    branches:
      - main
    paths:
      - "macromodel/**"
      - "macro_data/**"
      - "macrocalib/**"
      - "test_run/**"
  pull_request:
    paths:
      - "macromodel/**"
      - "macro_data/**"
      - "macrocalib/**"
      - "test_run/**"

jobs:
  simulate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
        country: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.country)) || fromJSON('["CAN", "FRA"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install h5py dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev

      - name: Install project dependencies
        run: uv sync --python ${{ matrix.python-version }} --extra dev

      - name: Resolve simulation parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "scale=${{ inputs.scale }}" >> "$GITHUB_OUTPUT"
            echo "tmax=${{ inputs.t-max }}" >> "$GITHUB_OUTPUT"
          else
            echo "scale=10000" >> "$GITHUB_OUTPUT"
            echo "tmax=20" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ${{ matrix.country }} simulation
        run: uv run python test_run/run_simulation.py ${{ matrix.country }} --scale ${{ steps.params.outputs.scale }} --t-max ${{ steps.params.outputs.tmax }}

      - name: Inspect income for ${{ matrix.country }}
        run: uv run python test_run/inspect_income.py ${{ matrix.country }}

      - name: Generate summary and visualizations for ${{ matrix.country }}
        run: uv run python test_run/summary_and_viz.py ${{ matrix.country }}

      - name: List output
        if: always()
        run: ls -lah output/

      - name: Upload simulation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.country }}-simulation-output
          path: output/
          retention-days: 7
